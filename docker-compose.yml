services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - generated_assets:/app/static/generated
      - push_data:/app/data/push

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_ENABLE_TMA_DEV_FALLBACK: ${NEXT_PUBLIC_ENABLE_TMA_DEV_FALLBACK:-false}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  generated_assets:
  push_data:
