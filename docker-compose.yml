services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - generated_assets:/app/static/generated

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_ENABLE_TMA_DEV_FALLBACK: ${NEXT_PUBLIC_ENABLE_TMA_DEV_FALLBACK:-false}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tamagotchi
      POSTGRES_PASSWORD: tamagotchi
      POSTGRES_DB: tamagotchi
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  generated_assets:
