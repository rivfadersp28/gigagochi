name: Check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.lock
            backend/requirements-dev.lock
      - run: >-
          python -m pip install
          --require-hashes
          --only-binary=:all:
          --requirement requirements-dev.lock
      - run: python -m pip check
      - run: python scripts/check_dependency_lock.py
      - name: Verify arm64 wheel lock
        run: >-
          python -m pip download
          --dest "${RUNNER_TEMP}/backend-wheels-arm64"
          --require-hashes
          --only-binary=:all:
          --platform manylinux_2_28_aarch64
          --platform manylinux2014_aarch64
          --python-version 3.12
          --implementation cp
          --abi cp312
          --requirement requirements-dev.lock
      - run: ruff check app tests scripts
      - run: ruff format app tests scripts --check
      - run: pytest -q
      - run: python -m scripts.export_openapi ../frontend/openapi.json --check
      - run: docker build --tag gigagochi-backend:ci .
      - run: test "$(docker image inspect gigagochi-backend:ci --format '{{.Config.User}}')" = gigagochi

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: |
          test -f .next/standalone/server.js
          test -d public
          test -d .next/static
      - run: docker build --build-arg BACKEND_URL=http://backend:8000 --tag gigagochi-frontend:ci .
