<!doctype html>
<html lang="ru">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Visual comparison</title>
<style>
  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    background: #000;
  }

  main {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0;
    width: 100%;
  }

  video {
    display: block;
    width: 100%;
    height: 100vh;
    object-fit: contain;
    background: #000;
  }

  @media (max-width: 700px) {
    video {
      height: 70vh;
    }
  }
</style>
<body>
<main>
  <video autoplay loop muted playsinline preload="auto" src="ice-dragon/kandinsky/normal.mp4"></video>
  <video autoplay loop muted playsinline preload="auto" src="ice-dragon/openai/normal.mp4"></video>
  <video autoplay loop muted playsinline preload="auto" src="ice-dragon/kandinsky/story-start.mp4"></video>
  <video autoplay loop muted playsinline preload="auto" src="ice-dragon/openai/story-start.mp4"></video>

  <video autoplay loop muted playsinline preload="auto" src="apple-person/kandinsky/normal.mp4"></video>
  <video autoplay loop muted playsinline preload="auto" src="apple-person/openai/normal.mp4"></video>
  <video autoplay loop muted playsinline preload="auto" src="apple-person/kandinsky/story-start.mp4"></video>
  <video autoplay loop muted playsinline preload="auto" src="apple-person/openai/story-start.mp4"></video>

  <video autoplay loop muted playsinline preload="auto" src="toilet/kandinsky/normal.mp4"></video>
  <video autoplay loop muted playsinline preload="auto" src="toilet/openai/normal.mp4"></video>
  <video autoplay loop muted playsinline preload="auto" src="toilet/kandinsky/story-start.mp4"></video>
  <video autoplay loop muted playsinline preload="auto" src="toilet/openai/story-start.mp4"></video>
</main>
</body>
</html>
