services:
  volume-permissions:
    image: gigagochi-backend:latest
    build:
      context: ./backend
    user: "0:0"
    command: ["sh", "/app/scripts/ensure_volume_permissions.sh"]
    restart: "no"
    read_only: true
    network_mode: none
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    volumes:
      - generated_assets:/app/static/generated
      - backend_logs:/app/logs
      - push_data:/app/data/push
    logging: &default-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: gigagochi-backend:latest
    build:
      context: ./backend
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=256m,mode=1777
    depends_on:
      volume-permissions:
        condition: service_completed_successfully
    stop_grace_period: 20m
    env_file:
      - ./backend/.env
    environment:
      TMPDIR: /app/static/generated/.private/processing-tmp
      BACKEND_INTERNAL_URL: http://backend:8000
      ALLOW_DEV_TMA_AUTH: "false"
      STORAGE_HEALTH_MIN_FREE_BYTES: "${STORAGE_HEALTH_MIN_FREE_BYTES:-1073741824}"
      STORAGE_HEALTH_MIN_FREE_PERCENT: "${STORAGE_HEALTH_MIN_FREE_PERCENT:-5}"
      STORAGE_HEALTH_PROBE_CACHE_SECONDS: "${STORAGE_HEALTH_PROBE_CACHE_SECONDS:-10}"
      STORAGE_ADMISSION_IMAGE_RESERVE_BYTES: "${STORAGE_ADMISSION_IMAGE_RESERVE_BYTES:-33554432}"
      STORAGE_ADMISSION_VIDEO_RESERVE_BYTES: "${STORAGE_ADMISSION_VIDEO_RESERVE_BYTES:-268435456}"
      MEDIA_IMAGE_CONCURRENCY: "${MEDIA_IMAGE_CONCURRENCY:-4}"
      MEDIA_VIDEO_CONCURRENCY: "${MEDIA_VIDEO_CONCURRENCY:-2}"
      GENERATION_IMAGE_WORKERS: "${GENERATION_IMAGE_WORKERS:-4}"
      GENERATION_VIDEO_WORKERS: "${GENERATION_VIDEO_WORKERS:-2}"
    ports:
      - "127.0.0.1:18080:8000"
    networks:
      default:
      public_proxy:
        aliases:
          - gigagochi-backend
    volumes:
      - generated_assets:/app/static/generated
      - backend_logs:/app/logs
      - ./backend/data/speech_runtime.json:/app/data/speech_runtime.json:ro
      - ./backend/data/llm_runtime.json:/app/data/llm_runtime.json:ro
      - ./backend/data/media_runtime.json:/app/data/media_runtime.json:ro
      - ./backend/data/tone_runtime.json:/app/data/tone_runtime.json:ro
      - ./backend/data/lore_runtime.json:/app/data/lore_runtime.json:ro
      - ./backend/data/story_library.json:/app/data/story_library.json:ro
      - ./backend/data/story_constructor.json:/app/data/story_constructor.json:ro
      - ./backend/data/character_bible_template.json:/app/data/character_bible_template.json:ro
      - ./backend/data/age_speech_examples:/app/data/age_speech_examples:ro
      - ./backend/data/world_descriptions:/app/data/world_descriptions:ro
      - ./deploy/ca:/app/ca:ro
      - push_data:/app/data/push
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: *default-logging

  bot:
    image: gigagochi-backend:latest
    build:
      context: ./backend
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=256m,mode=1777
    stop_grace_period: 20m
    depends_on:
      - backend
    env_file:
      - ./backend/.env
    environment:
      TMPDIR: /app/static/generated/.private/processing-tmp
      BACKEND_INTERNAL_URL: http://backend:8000
      STORAGE_HEALTH_MIN_FREE_BYTES: "${STORAGE_HEALTH_MIN_FREE_BYTES:-1073741824}"
      STORAGE_HEALTH_MIN_FREE_PERCENT: "${STORAGE_HEALTH_MIN_FREE_PERCENT:-5}"
      STORAGE_HEALTH_PROBE_CACHE_SECONDS: "${STORAGE_HEALTH_PROBE_CACHE_SECONDS:-10}"
      STORAGE_ADMISSION_IMAGE_RESERVE_BYTES: "${STORAGE_ADMISSION_IMAGE_RESERVE_BYTES:-33554432}"
      STORAGE_ADMISSION_VIDEO_RESERVE_BYTES: "${STORAGE_ADMISSION_VIDEO_RESERVE_BYTES:-268435456}"
      MEDIA_IMAGE_CONCURRENCY: "${MEDIA_IMAGE_CONCURRENCY:-4}"
      MEDIA_VIDEO_CONCURRENCY: "${MEDIA_VIDEO_CONCURRENCY:-2}"
    command: ["python", "-m", "app.bot"]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os,time; p='/tmp/gigagochi-bot-heartbeat'; raise SystemExit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p)<120 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 50s
    volumes:
      - generated_assets:/app/static/generated
      - backend_logs:/app/logs
      - ./backend/data/speech_runtime.json:/app/data/speech_runtime.json:ro
      - ./backend/data/llm_runtime.json:/app/data/llm_runtime.json:ro
      - ./backend/data/media_runtime.json:/app/data/media_runtime.json:ro
      - ./backend/data/tone_runtime.json:/app/data/tone_runtime.json:ro
      - ./backend/data/lore_runtime.json:/app/data/lore_runtime.json:ro
      - ./backend/data/story_library.json:/app/data/story_library.json:ro
      - ./backend/data/story_constructor.json:/app/data/story_constructor.json:ro
      - ./backend/data/character_bible_template.json:/app/data/character_bible_template.json:ro
      - ./backend/data/age_speech_examples:/app/data/age_speech_examples:ro
      - ./backend/data/world_descriptions:/app/data/world_descriptions:ro
      - ./deploy/ca:/app/ca:ro
      - push_data:/app/data/push
    logging: *default-logging

  frontend:
    image: gigagochi-frontend:latest
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_ENABLE_TMA_DEV_FALLBACK: "false"
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /app/.next/cache:size=128m,mode=0700,uid=1001,gid=1001
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:13000:3000"
    networks:
      default:
      public_proxy:
        aliases:
          - gigagochi-frontend
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: *default-logging

volumes:
  generated_assets:
  backend_logs:
  push_data:

networks:
  public_proxy:
    external: true
    name: ${PUBLIC_PROXY_NETWORK:-bizzy-radio_default}
